# Copy this file to ~/.dbt/profiles.yml
# Never commit your real credentials — use environment variables as shown below

ipl_analytics:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: SYSADMIN
      database: ipl_db
      warehouse: dbt_wh
      schema: staging
      threads: 4
